version: '3.8'

services:
  cbs-simulator:
    build:
      context: ./cbs-simulator
      dockerfile: Dockerfile
    container_name: cbs-simulator
    restart: unless-stopped
    ports:
      - "4000:8080" # Host port 4000 is mapped to container port 8080
    networks:
      - cbs-net

networks:
  cbs-net:
    driver: bridge 